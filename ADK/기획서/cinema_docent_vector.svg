<text xml:space="preserve" text-anchor="start" x="687.62" y="-133.7" font-family="Malgun Gothic" font-size="14.00"> &#160;• </text>
<text xml:space="preserve" text-anchor="start" x="709.38" y="-133.7" font-family="Malgun Gothic" font-size="14.00" fill="#b8860b">노란색:</text>
<text xml:space="preserve" text-anchor="start" x="755.12" y="-133.7" font-family="Malgun Gothic" font-size="14.00"> 팀원 직접 개발 프로세스 (Logic)</text>
<text xml:space="preserve" text-anchor="start" x="698.12" y="-119.7" font-family="Malgun Gothic" font-size="14.00"> &#160;• </text>
<text xml:space="preserve" text-anchor="start" x="719.88" y="-119.7" font-family="Malgun Gothic" font-size="14.00" fill="#696969">회색:</text>
<text xml:space="preserve" text-anchor="start" x="751.38" y="-119.7" font-family="Malgun Gothic" font-size="14.00"> 단계별 데이터 산출물 (Artifact)</text>
<text xml:space="preserve" text-anchor="start" x="683.5" y="-105.7" font-family="Malgun Gothic" font-size="14.00"> &#160;• </text>
<text xml:space="preserve" text-anchor="start" x="705.25" y="-105.7" font-family="Malgun Gothic" font-size="14.00" fill="#00008b">파란색:</text>
<text xml:space="preserve" text-anchor="start" x="751" y="-105.7" font-family="Malgun Gothic" font-size="14.00"> 외부 AI 모델 및 API (Component)</text>
<text xml:space="preserve" text-anchor="start" x="752.5" y="-77.7" font-family="Malgun Gothic" font-weight="bold" font-size="14.00">■ 핵심 기술 용어 설명</text>
<text xml:space="preserve" text-anchor="start" x="520.75" y="-63.7" font-family="Malgun Gothic" font-size="14.00"> &#160;• </text>
<text xml:space="preserve" text-anchor="start" x="542.5" y="-63.7" font-family="Malgun Gothic" font-weight="bold" font-size="14.00">Self&#45;Querying Retriever:</text>
<text xml:space="preserve" text-anchor="start" x="701.5" y="-63.7" font-family="Malgun Gothic" font-size="14.00"> 질문 의도를 파악해 스스로 메타데이터 필터를 걸어 검색하는 기술</text>
<text xml:space="preserve" text-anchor="start" x="568.38" y="-49.7" font-family="Malgun Gothic" font-size="14.00"> &#160;• </text>
<text xml:space="preserve" text-anchor="start" x="590.12" y="-49.7" font-family="Malgun Gothic" font-weight="bold" font-size="14.00">Embedding:</text>
<text xml:space="preserve" text-anchor="start" x="669.62" y="-49.7" font-family="Malgun Gothic" font-size="14.00"> 텍스트를 숫자로 변환해 의미적 유사도를 계산하는 AI 기초 과정</text>
<text xml:space="preserve" text-anchor="start" x="569.5" y="-35.7" font-family="Malgun Gothic" font-size="14.00"> &#160;• </text>
<text xml:space="preserve" text-anchor="start" x="591.25" y="-35.7" font-family="Malgun Gothic" font-weight="bold" font-size="14.00">Vector Store:</text>
<text xml:space="preserve" text-anchor="start" x="677.5" y="-35.7" font-family="Malgun Gothic" font-size="14.00"> 임베딩된 데이터를 저장하고 유사 의미를 빠르게 찾는 전용 DB</text>
<text xml:space="preserve" text-anchor="start" x="554.12" y="-21.7" font-family="Malgun Gothic" font-size="14.00"> &#160;• </text>
<text xml:space="preserve" text-anchor="start" x="575.88" y="-21.7" font-family="Malgun Gothic" font-weight="bold" font-size="14.00">Grounding:</text>
<text xml:space="preserve" text-anchor="start" x="650.12" y="-21.7" font-family="Malgun Gothic" font-size="14.00"> 실시간 검색을 통해 AI의 답변 근거를 보강하고 환각을 방지하는 기술</text>
